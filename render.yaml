# Render.com Blueprint — one-click deploy of the Garage Saathi backend.
# Usage: render.com → New → Blueprint → pick the garage-saathi repo.
# Render builds the Dockerfile and gives you an HTTPS URL.
services:
  - type: web
    name: garage-saathi-sync
    runtime: docker
    plan: starter                # paid (~$7/mo): persistent disk + always-on (no cold starts)
    region: singapore            # closest Render region to Jaipur
    autoDeploy: false            # don't redeploy on every git push (a redeploy rebuilds the image).
                                 # Deploy manually from the dashboard when the server actually changes.
    healthCheckPath: /health
    envVars:
      - key: GPS_INGEST_TOKEN     # set the real token (from .gps_ingest_token) in the dashboard
        sync: false
      - key: ALLOWED_ORIGIN       # set to your app's domain once the PWA is hosted
        value: "*"
      - key: VAPID_PRIVATE_KEY    # web-push signing key (PEM). Set in the dashboard / Secret File.
        sync: false
      - key: VAPID_SUBJECT        # contact for push services
        value: "mailto:mahalaxmitravels96@gmail.com"
      - key: ANTHROPIC_API_KEY    # enables the /ai advisor + (later) AI vision for parts
        sync: false

    # Persistent storage — the SQLite DB (/data/sync.db) and uploaded photos
    # (/data/uploads) survive redeploys. Mount path must stay /data (matches the
    # Dockerfile's DB_PATH / UPLOADS_DIR).
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
